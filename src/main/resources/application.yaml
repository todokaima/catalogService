spring:
  profiles:
    active: prod
  application:
    name: catalog-service
  config:
    import: "optional:configserver:http://localhost:8888"
  datasource:
    username: user
    password: password
    url: jdbc:postgresql://localhost:5433/polardb_catalog
    hikari:
      connection-timeout: 2000
      maximum-pool-size: 5

polar:
  greeting: "Polar greeting property value"

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: refresh
